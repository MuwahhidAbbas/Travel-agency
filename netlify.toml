[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/atlas-voyage run build"
  publish = "artifacts/atlas-voyage/dist/public"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"
  BASE_PATH     = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
